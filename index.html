<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head><body style="margin:0;font-family:sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;box-sizing:border-box"><div style="width:100%;max-width:420px"><div style="font-size:48px;text-align:center;margin-bottom:12px">✓</div><h2 style="font-size:22px;font-weight:900;color:#0f172a;text-align:center;margin:0 0 8px">Shopify connected!</h2><p style="font-size:14px;color:#64748b;text-align:center;margin:0 0 24px;line-height:1.5">Tap <strong>Copy Code</strong> below, then return to Auto Fulfill and paste it.</p><input id="c" readonly style="width:100%;box-sizing:border-box;font-family:monospace;font-size:12px;padding:12px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;color:#334155"><button onclick="cp()" id="b" style="margin-top:10px;width:100%;padding:15px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer">Copy Code</button><p id="m" style="text-align:center;color:#10b981;font-size:13px;margin-top:10px;min-height:18px"></p></div><script>var p=new URLSearchParams(location.search);document.getElementById('c').value=p.get('code')+'|'+p.get('state');function cp(){var v=document.getElementById('c').value;if(navigator.clipboard){navigator.clipboard.writeText(v).then(function(){document.getElementById('b').textContent='✓ Copied!';document.getElementById('m').textContent='Return to Auto Fulfill and paste the code.'})}else{var i=document.getElementById('c');i.select();document.execCommand('copy');document.getElementById('b').textContent='✓ Copied!';document.getElementById('m').textContent='Return to Auto Fulfill and paste the code.'}}</script></body></html>
